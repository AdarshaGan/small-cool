<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Happy Birthday ✨</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <div class="background-blur"></div>

  <header>
    <h1>happy birthday ♡</h1>
    <p>a tiny timeline of you</p>
  </header>

  <div class="timeline">

    <div class="timeline-item">
      <div class="dot" onclick="toggleCard(this)"></div>

      <div class="card">
        <img src="images/pic1.png" alt="">
        <h2>tiny human era</h2>
        <p>the beginning of the lore</p>
      </div>
    </div>

    <div class="timeline-item">
      <div class="dot" onclick="toggleCard(this)"></div>

      <div class="card">
        <img src="images/pic2.jpeg" alt="">
        <h2>middle school arc</h2>
        <p>questionable fashion choices probably</p>
      </div>
    </div>

    <div class="timeline-item">
      <div class="dot" onclick="toggleCard(this)"></div>

      <div class="card">
        <img src="images/pic3.jpeg" alt="">
        <h2>high school era</h2>
        <p>main character energy begins</p>
      </div>
    </div>

    <div class="timeline-item">
      <div class="dot" onclick="toggleCard(this)"></div>

      <div class="card">
        <img src="images/pic4.png" alt="">
        <h2>iconic era</h2>
        <p>everyone say thank you</p>
      </div>
    </div>

    <div class="timeline-item">
      <div class="dot" onclick="toggleCard(this)"></div>

      <div class="card">
        <img src="images/pic5.png" alt="">
        <h2>current day</h2>
        <p>still slaying actually</p>
      </div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
